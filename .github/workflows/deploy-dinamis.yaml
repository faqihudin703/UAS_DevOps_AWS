name: Deploy Dynamic Web

on:
  push:
    branches: [main]
    paths:
      - "web-dinamis/**"
      - "docker-compose.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image dinamis
        uses: docker/build-push-action@v5
        with:
          context: ./web-dinamis
          push: true
          tags: faqih703/uas_dinamis:latest

      - name: Copy docker-compose ke EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          source: "docker-compose.yml, /db_data/dbcompro_2388010020.sql"
          target: "/home/ubuntu/docker-aws/"

      - name: Deploy ke AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/docker-aws
            docker compose pull container-dinamis
            docker compose up -d container-dinamis
            echo "[dinamis] deployed at $(date)"